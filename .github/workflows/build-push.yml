name: Build and Push Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
            runner: snapcast-runner
          - platform: linux/arm64
            suffix: arm64
            runner: ARM64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      # docker driver on Mac: inherits host credentials, no isolated BuildKit container
      # docker-container on Linux: supports GHA cache export
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
        with:
          driver: ${{ runner.os == 'macOS' && 'docker' || 'docker-container' }}

      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get latest snapcast commit SHA
        id: snapcast
        run: |
          SHA=$(git ls-remote https://github.com/badaix/snapcast.git HEAD | cut -f1)
          if [[ -z "$SHA" ]]; then
            echo "ERROR: Failed to fetch snapcast HEAD commit"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "snapcast HEAD: $SHA"

      - name: Build and push snapserver
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile.snapserver
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            SNAPCAST_SHA=${{ steps.snapcast.outputs.sha }}
          tags: |
            lollonet/snapmulti-server:${{ matrix.suffix }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-server:{0}-{1}', steps.version.outputs.tag, matrix.suffix) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=snapserver-{0}', matrix.suffix) || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=snapserver-{0}', matrix.suffix) || '' }}

      - name: Build and push shairport-sync
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile.shairport-sync
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            lollonet/snapmulti-airplay:${{ matrix.suffix }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-airplay:{0}-{1}', steps.version.outputs.tag, matrix.suffix) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=airplay-{0}', matrix.suffix) || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=airplay-{0}', matrix.suffix) || '' }}

      # Spotify Connect: uses official ghcr.io/devgianlu/go-librespot image (no build needed)

      - name: Build and push mpd
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile.mpd
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            lollonet/snapmulti-mpd:${{ matrix.suffix }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-mpd:{0}-{1}', steps.version.outputs.tag, matrix.suffix) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=mpd-{0}', matrix.suffix) || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=mpd-{0}', matrix.suffix) || '' }}

      - name: Build and push metadata
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile.metadata
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            lollonet/snapmulti-metadata:${{ matrix.suffix }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-metadata:{0}-{1}', steps.version.outputs.tag, matrix.suffix) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=metadata-{0}', matrix.suffix) || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=metadata-{0}', matrix.suffix) || '' }}

      # Tidal Connect - ARM only (Pi 3/4/5)
      # Base image edgecrush3r/tidal-connect only provides ARM binaries
      - name: Build and push tidal
        if: matrix.platform == 'linux/arm64'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile.tidal
          platforms: linux/arm64
          push: true
          tags: |
            lollonet/snapmulti-tidal:arm64
            lollonet/snapmulti-tidal:latest
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-tidal:{0}', steps.version.outputs.tag) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=tidal-arm64') || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=tidal-arm64') || '' }}

  manifest:
    needs: build
    runs-on: snapcast-runner
    steps:
      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest for snapserver
        run: |
          docker buildx imagetools create -t lollonet/snapmulti-server:latest \
            lollonet/snapmulti-server:amd64 \
            lollonet/snapmulti-server:arm64

      - name: Create versioned tag for snapserver
        if: steps.version.outputs.tag != ''
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          docker buildx imagetools create -t "lollonet/snapmulti-server:$VERSION" \
            "lollonet/snapmulti-server:$VERSION-amd64" \
            "lollonet/snapmulti-server:$VERSION-arm64"

      - name: Create multi-arch manifest for airplay
        run: |
          docker buildx imagetools create -t lollonet/snapmulti-airplay:latest \
            lollonet/snapmulti-airplay:amd64 \
            lollonet/snapmulti-airplay:arm64

      - name: Create versioned tag for airplay
        if: steps.version.outputs.tag != ''
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          docker buildx imagetools create -t "lollonet/snapmulti-airplay:$VERSION" \
            "lollonet/snapmulti-airplay:$VERSION-amd64" \
            "lollonet/snapmulti-airplay:$VERSION-arm64"

      # Spotify Connect: uses official ghcr.io/devgianlu/go-librespot image (no manifest needed)

      - name: Create multi-arch manifest for metadata
        run: |
          docker buildx imagetools create -t lollonet/snapmulti-metadata:latest \
            lollonet/snapmulti-metadata:amd64 \
            lollonet/snapmulti-metadata:arm64

      - name: Create versioned tag for metadata
        if: steps.version.outputs.tag != ''
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          docker buildx imagetools create -t "lollonet/snapmulti-metadata:$VERSION" \
            "lollonet/snapmulti-metadata:$VERSION-amd64" \
            "lollonet/snapmulti-metadata:$VERSION-arm64"

      - name: Create multi-arch manifest for mpd
        run: |
          docker buildx imagetools create -t lollonet/snapmulti-mpd:latest \
            lollonet/snapmulti-mpd:amd64 \
            lollonet/snapmulti-mpd:arm64

      - name: Create versioned tag for mpd
        if: steps.version.outputs.tag != ''
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          docker buildx imagetools create -t "lollonet/snapmulti-mpd:$VERSION" \
            "lollonet/snapmulti-mpd:$VERSION-amd64" \
            "lollonet/snapmulti-mpd:$VERSION-arm64"

