name: Build and Push Images

# Production tags (lollonet/snapmulti-*:<image_set>) are pushed only on
# tag push (refs/tags/v*) or explicit workflow_dispatch — NEVER on PR
# CI. The gate job below additionally suppresses the build matrix when
# release-manifest.json's requires_image_rebuild=false flag says the
# previous image set still covers this release (script-only releases).
# Operators forcing a rebuild for emergencies (security CVE in a base
# image, accidentally-deleted Docker Hub tag) set
# workflow_dispatch.force_rebuild=true.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      use_santcasp:
        description: 'Build :dev images from santcasp fork'
        required: false
        type: boolean
        default: false
      force_rebuild:
        description: 'Bypass the manifest gate and rebuild even when requires_image_rebuild=false (emergency override)'
        required: false
        type: boolean
        default: false

jobs:
  gate:
    # Reads release-manifest.json to decide whether the build matrix
    # runs. Three outputs: should_rebuild ('true' must run; 'false'
    # safe to skip), image_set (Docker tag — decoupled from
    # github.ref_name so a script-only release tagged v0.7.8 can
    # still publish 0.7.7 images), release (git tag for x-ref).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_rebuild: ${{ steps.decide.outputs.should_rebuild }}
      image_set: ${{ steps.decide.outputs.image_set }}
      release: ${{ steps.decide.outputs.release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read release-manifest.json
        id: manifest
        run: |
          set -euo pipefail
          if [[ ! -f release-manifest.json ]]; then
            echo "::error::release-manifest.json missing at repo root"
            exit 1
          fi
          IMAGE_SET=$(jq -r '.image_set' release-manifest.json)
          RELEASE=$(jq -r '.snapmulti_release' release-manifest.json)
          REBUILD=$(jq -r '.requires_image_rebuild' release-manifest.json)
          if [[ ! "$IMAGE_SET" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::image_set '$IMAGE_SET' does not match X.Y.Z"
            exit 1
          fi
          if [[ "$REBUILD" != "true" && "$REBUILD" != "false" ]]; then
            echo "::error::requires_image_rebuild '$REBUILD' is not literal true/false"
            exit 1
          fi
          {
            echo "image_set=$IMAGE_SET"
            echo "release=$RELEASE"
            echo "rebuild=$REBUILD"
          } >> "$GITHUB_OUTPUT"

      - name: Decide should_rebuild
        id: decide
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          USE_SANTCASP: ${{ inputs.use_santcasp }}
          MANIFEST_REBUILD: ${{ steps.manifest.outputs.rebuild }}
          MANIFEST_IMAGE_SET: ${{ steps.manifest.outputs.image_set }}
          MANIFEST_RELEASE: ${{ steps.manifest.outputs.release }}
        run: |
          set -euo pipefail
          if [[ "$FORCE_REBUILD" == "true" ]] \
              || [[ "$USE_SANTCASP" == "true" ]] \
              || [[ "$MANIFEST_REBUILD" == "true" ]]; then
            SHOULD_REBUILD=true
          else
            SHOULD_REBUILD=false
          fi
          {
            echo "should_rebuild=$SHOULD_REBUILD"
            echo "image_set=$MANIFEST_IMAGE_SET"
            echo "release=$MANIFEST_RELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "Gate decision: should_rebuild=$SHOULD_REBUILD image_set=$MANIFEST_IMAGE_SET"

      - name: Verify image set on Docker Hub
        if: steps.decide.outputs.should_rebuild == 'false'
        env:
          IMAGE_SET: ${{ steps.decide.outputs.image_set }}
        run: |
          set -euo pipefail
          missing=()
          for image in lollonet/snapmulti-server lollonet/snapmulti-airplay \
                       lollonet/snapmulti-mpd lollonet/snapmulti-metadata \
                       lollonet/snapmulti-tidal; do
            if ! docker manifest inspect "${image}:${IMAGE_SET}" >/dev/null 2>&1; then
              missing+=("${image}:${IMAGE_SET}")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::manifest gate: required image tags missing on Docker Hub"
            printf '  - %s\n' "${missing[@]}"
            echo "::error::Rerun with workflow_dispatch.force_rebuild=true to bypass."
            exit 1
          fi
          echo "manifest gate: all 5 image tags exist on Hub, skip rebuild safe"

  build:
    needs: gate
    if: needs.gate.outputs.should_rebuild == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
            runner: snapcast-runner
          - platform: linux/arm64
            suffix: arm64
            runner: ARM64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Determine image label
        id: version
        env:
          USE_SANTCASP: ${{ inputs.use_santcasp }}
          # Image tag for tagged releases comes from the gate's
          # manifest read — NOT github.ref_name — so a force-rebuilt
          # script-only release publishes the manifest's image_set
          # (e.g. 0.7.7), not the just-cut release tag (e.g. v0.7.8).
          GATE_IMAGE_SET: ${{ needs.gate.outputs.image_set }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tagged release: push :latest + :<image_set> from manifest.
            {
              echo "tag=$GATE_IMAGE_SET"
              echo "label=latest"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$USE_SANTCASP" == "true" ]]; then
            # Manual dispatch with santcasp: push :dev (santcasp fork)
            {
              echo "tag="
              echo "label=dev"
            } >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch without santcasp: push :manual (badaix)
            {
              echo "tag="
              echo "label=manual"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Determine snapcast source
        id: snapcast
        env:
          USE_SANTCASP: ${{ inputs.use_santcasp }}
        run: |
          if [[ "$USE_SANTCASP" == "true" ]]; then
            REPO="https://github.com/lollonet/santcasp.git"
            BRANCH="develop"
            TAG=""  # santcasp uses branch, not tag
            REF="refs/heads/$BRANCH"
          else
            REPO="https://github.com/badaix/snapcast.git"
            BRANCH="master"
            TAG="v0.35.0"  # pin stable release
            REF="refs/tags/$TAG"
          fi
          SHA=$(git ls-remote "$REPO" "$REF" | cut -f1)
          if [[ -z "$SHA" ]]; then
            echo "ERROR: Failed to fetch $REF from $REPO"
            exit 1
          fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "snapcast: $REPO ($BRANCH) SHA: $SHA"

      # docker driver on Mac: inherits host credentials, no isolated BuildKit container
      # docker-container on Linux: supports GHA cache export
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver: ${{ runner.os == 'macOS' && 'docker' || 'docker-container' }}

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push snapserver
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.snapserver
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            SNAPCAST_REPO=${{ steps.snapcast.outputs.repo }}
            SNAPCAST_TAG=${{ steps.snapcast.outputs.tag }}
            SNAPCAST_BRANCH=${{ steps.snapcast.outputs.branch }}
            SNAPCAST_SHA=${{ steps.snapcast.outputs.sha }}
          tags: |
            lollonet/snapmulti-server:${{ steps.version.outputs.label }}-${{ matrix.suffix }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-server:{0}-{1}', steps.version.outputs.tag, matrix.suffix) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=snapserver-{0}', matrix.suffix) || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=snapserver-{0}', matrix.suffix) || '' }}

      - name: Build and push shairport-sync
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.shairport-sync
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            lollonet/snapmulti-airplay:${{ steps.version.outputs.label }}-${{ matrix.suffix }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-airplay:{0}-{1}', steps.version.outputs.tag, matrix.suffix) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=airplay-{0}', matrix.suffix) || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=airplay-{0}', matrix.suffix) || '' }}

      # Spotify Connect: uses official ghcr.io/devgianlu/go-librespot image (no build needed)

      - name: Build and push mpd
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.mpd
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            lollonet/snapmulti-mpd:${{ steps.version.outputs.label }}-${{ matrix.suffix }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-mpd:{0}-{1}', steps.version.outputs.tag, matrix.suffix) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=mpd-{0}', matrix.suffix) || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=mpd-{0}', matrix.suffix) || '' }}

      - name: Build and push metadata
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.metadata
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            SNAPMULTI_VERSION=${{ steps.version.outputs.tag && format('v{0}', steps.version.outputs.tag) || steps.version.outputs.label }}
          tags: |
            lollonet/snapmulti-metadata:${{ steps.version.outputs.label }}-${{ matrix.suffix }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-metadata:{0}-{1}', steps.version.outputs.tag, matrix.suffix) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=metadata-{0}', matrix.suffix) || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=metadata-{0}', matrix.suffix) || '' }}

      # Tidal Connect - ARM only (Pi 3/4/5)
      # Base image edgecrush3r/tidal-connect only provides ARM binaries
      - name: Build and push tidal
        if: matrix.platform == 'linux/arm64'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.tidal
          platforms: linux/arm64
          push: true
          tags: |
            lollonet/snapmulti-tidal:${{ steps.version.outputs.label }}
            ${{ steps.version.outputs.tag && format('lollonet/snapmulti-tidal:{0}', steps.version.outputs.tag) || '' }}
          cache-from: ${{ runner.os == 'Linux' && format('type=gha,scope=tidal-arm64') || '' }}
          cache-to: ${{ runner.os == 'Linux' && format('type=gha,mode=max,scope=tidal-arm64') || '' }}

  # Client images — ARM only (built on Mac runner)
  build-client:
    needs: gate
    if: needs.gate.outputs.should_rebuild == 'true'
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver: docker

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image label
        id: version
        env:
          USE_SANTCASP: ${{ inputs.use_santcasp }}
          # Image tag for tagged releases comes from the gate's manifest
          # read — NOT github.ref_name — so a script-only release tagged
          # vX.Y.Z+1 with image_set=X.Y.Z keeps publishing X.Y.Z client
          # images (parity with the server build job).
          GATE_IMAGE_SET: ${{ needs.gate.outputs.image_set }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            {
              echo "tag=$GATE_IMAGE_SET"
              echo "label=latest"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$USE_SANTCASP" == "true" ]]; then
            {
              echo "tag="
              echo "label=dev"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tag="
              echo "label=manual"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Determine snapcast source
        id: snapcast
        env:
          USE_SANTCASP: ${{ inputs.use_santcasp }}
        run: |
          if [[ "$USE_SANTCASP" == "true" ]]; then
            REPO="https://github.com/lollonet/santcasp.git"
            BRANCH="develop"
            TAG=""
            REF="refs/heads/$BRANCH"
          else
            REPO="https://github.com/badaix/snapcast.git"
            BRANCH="master"
            TAG="v0.35.0"
            REF="refs/tags/$TAG"
          fi
          SHA=$(git ls-remote "$REPO" "$REF" | cut -f1)
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push snapclient
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: client/common/docker/snapclient
          platforms: linux/arm64
          push: true
          build-args: |
            SNAPCAST_REPO=${{ steps.snapcast.outputs.repo }}
            SNAPCAST_TAG=${{ steps.snapcast.outputs.tag }}
            SNAPCAST_SHA=${{ steps.snapcast.outputs.sha }}
          tags: |
            lollonet/snapclient-pi:${{ steps.version.outputs.label }}
            ${{ steps.version.outputs.tag && format('lollonet/snapclient-pi:{0}', steps.version.outputs.tag) || '' }}

      - name: Build and push audio-visualizer
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: client/common/docker/audio-visualizer
          platforms: linux/arm64
          push: true
          tags: |
            lollonet/snapclient-pi-visualizer:${{ steps.version.outputs.label }}
            ${{ steps.version.outputs.tag && format('lollonet/snapclient-pi-visualizer:{0}', steps.version.outputs.tag) || '' }}

      - name: Build and push fb-display
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: client/common/docker/fb-display
          platforms: linux/arm64
          push: true
          tags: |
            lollonet/snapclient-pi-fb-display:${{ steps.version.outputs.label }}
            ${{ steps.version.outputs.tag && format('lollonet/snapclient-pi-fb-display:{0}', steps.version.outputs.tag) || '' }}

  manifest:
    needs: [build, build-client]
    runs-on: snapcast-runner
    steps:
      - name: Determine image label
        id: version
        env:
          USE_SANTCASP: ${{ inputs.use_santcasp }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "label=latest" >> "$GITHUB_OUTPUT"
          elif [[ "$USE_SANTCASP" == "true" ]]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "label=dev" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "label=manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          LABEL="${{ steps.version.outputs.label }}"
          VERSION="${{ steps.version.outputs.tag }}"

          # Create :latest or :dev manifest for each image
          for image in snapmulti-server snapmulti-airplay snapmulti-metadata snapmulti-mpd; do
            echo "Creating manifest lollonet/$image:$LABEL"
            docker buildx imagetools create -t "lollonet/$image:$LABEL" \
              "lollonet/$image:$LABEL-amd64" \
              "lollonet/$image:$LABEL-arm64"
          done

          # Create versioned manifests for tagged releases
          if [[ -n "$VERSION" ]]; then
            for image in snapmulti-server snapmulti-airplay snapmulti-metadata snapmulti-mpd; do
              echo "Creating manifest lollonet/$image:$VERSION"
              docker buildx imagetools create -t "lollonet/$image:$VERSION" \
                "lollonet/$image:$VERSION-amd64" \
                "lollonet/$image:$VERSION-arm64"
            done
          fi
