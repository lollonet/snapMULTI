name: Validate Configurations

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Create dummy .env for validation
        run: |
          if [ ! -f .env.example ]; then
            echo "ERROR: .env.example missing"
            exit 1
          fi
          cp .env.example .env
          echo "✓ Created .env from .env.example"

      - name: Validate docker-compose syntax
        run: |
          echo "Validating docker-compose configuration..."
          if ! docker compose config > /dev/null 2>&1; then
            echo "ERROR: docker-compose configuration invalid"
            docker compose config
            exit 1
          fi
          echo "✓ docker-compose configuration valid"

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck &>/dev/null; then
            apt-get update && apt-get install -y shellcheck || {
              echo "ERROR: Failed to install shellcheck"
              exit 1
            }
          fi

      - name: Shellcheck scripts
        run: |
          echo "Running shellcheck on shell scripts..."
          FAILED=0
          # Server scripts
          for f in scripts/*.sh scripts/**/*.sh; do
            [ -f "$f" ] || continue
            echo "  Checking $f"
            if ! shellcheck -x -S warning "$f"; then FAILED=1; fi
          done
          # Client scripts
          for f in client/common/scripts/*.sh client/tests/*.sh; do
            [ -f "$f" ] || continue
            echo "  Checking $f"
            if ! shellcheck -x -S warning "$f"; then FAILED=1; fi
          done
          # Server test suite — the bash-tests job runs these; lint
          # them here so style issues surface alongside runtime
          # assertions instead of being silent. SC2034 (var unused)
          # is suppressed because the eval-inside-assert pattern
          # references variables that shellcheck cannot trace into
          # the eval string.
          for f in tests/test_*.sh; do
            [ -f "$f" ] || continue
            echo "  Checking $f"
            if ! shellcheck -x -S warning -e SC2034 "$f"; then FAILED=1; fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "ERROR: shellcheck found issues"
            exit 1
          fi
          echo "✓ All scripts pass shellcheck"

      - name: Install hadolint
        run: |
          HL_VERSION="v2.12.0"
          curl -fLso /tmp/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/${HL_VERSION}/hadolint-Linux-x86_64"
          sudo install /tmp/hadolint /usr/local/bin/
          rm -f /tmp/hadolint

      - name: Hadolint Dockerfiles
        run: |
          echo "Linting Dockerfiles..."
          FAILED=0
          # Server Dockerfiles
          for f in Dockerfile.*; do
            [ -f "$f" ] || continue
            echo "  Checking $f"
            if ! hadolint --config .hadolint.yaml --failure-threshold warning "$f"; then FAILED=1; fi
          done
          # Client Dockerfiles
          for f in client/common/docker/*/Dockerfile; do
            [ -f "$f" ] || continue
            echo "  Checking $f"
            if ! hadolint --config .hadolint.yaml --failure-threshold warning "$f"; then FAILED=1; fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "ERROR: hadolint found issues"
            exit 1
          fi
          echo "✓ All Dockerfiles pass hadolint"

      - name: Verify prepare-sd.sh / prepare-sd.ps1 parity
        run: |
          echo "Checking file copy parity between bash and PowerShell scripts..."
          # Extract copied filenames from both scripts
          grep -oP "cp.*\"\$\w+/\K[^\"]+|Copy-Item.*'[^']*\\\\(\K[^']+)" \
            scripts/prepare-sd.sh scripts/prepare-sd.ps1 2>/dev/null | sort -u > /dev/null

          # Check install.conf fields match
          SH_FIELDS=$(grep -oP '^\w+=' scripts/prepare-sd.sh | grep -v '^#' | sort -u)
          PS_FIELDS=$(grep -oP '^\w+=' scripts/prepare-sd.ps1 | grep -v '^#' | sort -u)

          # Check key files are in both copy functions
          MISSING=0
          for file in deploy.sh boot-tune.sh ro-mode.sh discover-server.sh setup.sh display.sh display-detect.sh; do
            if grep -q "$file" scripts/prepare-sd.sh && ! grep -q "$file" scripts/prepare-sd.ps1; then
              echo "ERROR: $file in prepare-sd.sh but missing from prepare-sd.ps1"
              MISSING=1
            fi
            if grep -q "$file" scripts/prepare-sd.ps1 && ! grep -q "$file" scripts/prepare-sd.sh; then
              echo "ERROR: $file in prepare-sd.ps1 but missing from prepare-sd.sh"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "✓ prepare-sd scripts in sync"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Python lint and format check
        run: |
          pip install ruff==0.15.8
          echo "Running ruff check..."
          ruff check docker/metadata-service/ scripts/meta_*.py tests/
          echo "✓ ruff check passed"
          echo "Running ruff format check..."
          ruff format --check docker/metadata-service/ scripts/meta_*.py tests/
          echo "✓ ruff format passed"

      - name: Run server Python tests
        run: |
          pip install pytest==8.3.4
          pytest tests/ -v --tb=short

      - name: Run client Python tests
        run: |
          pip install numpy==2.4.3 Pillow==11.1.0 requests==2.32.3 websockets==14.1
          pytest client/tests/ -v --tb=short

      - name: Server bash tests
        run: |
          echo "Running server shell tests..."
          FAILED=0
          for f in tests/test_*.sh; do
            [ -f "$f" ] || continue
            case "$f" in
              tests/test_compose_health.sh|tests/test_device_smoke.sh) continue ;;
            esac
            echo "  Running $f"
            if ! bash "$f"; then FAILED=1; fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "ERROR: server bash tests failed"
            exit 1
          fi
          echo "All server bash tests passed"

      - name: Client bash tests
        run: |
          bash -n client/common/scripts/setup.sh
          bash -n client/common/scripts/setup-zero2w.sh
          bash client/tests/test_hat_configs.sh
          bash client/tests/test_entrypoint.sh
          bash client/tests/test_resource_profiles.sh
          bash client/tests/test_pull_hardening.sh

      - name: Validate systemd drop-in syntax
        run: |
          # The Pi Zero 2W native install ships a drop-in override at
          # /etc/systemd/system/snapclient.service.d/snapmulti-override.conf.
          # Extract its contents from setup-zero2w.sh (the script embeds
          # the unit via a heredoc) and validate with systemd-analyze.
          set -e
          if ! command -v systemd-analyze >/dev/null 2>&1; then
            # systemd pulls tzdata which prompts for timezone selection
            # interactively when DEBIAN_FRONTEND is unset — would hang
            # the runner. Force noninteractive.
            DEBIAN_FRONTEND=noninteractive apt-get update -qq && \
            DEBIAN_FRONTEND=noninteractive apt-get install -y -q systemd
          fi
          tmpdir=$(mktemp -d)
          mkdir -p "$tmpdir/snapclient.service.d"
          awk '
            /cat > "\$DROPIN_DIR\/snapmulti-override.conf" <</ { in_heredoc=1; next }
            in_heredoc && /^EOF$/ { in_heredoc=0; next }
            in_heredoc { print }
          ' client/common/scripts/setup-zero2w.sh > "$tmpdir/snapclient.service.d/snapmulti-override.conf"
          if [ ! -s "$tmpdir/snapclient.service.d/snapmulti-override.conf" ]; then
            echo "ERROR: Could not extract systemd drop-in from setup-zero2w.sh"
            exit 1
          fi
          # systemd-analyze verify needs the base unit; the upstream
          # snapclient.service from the .deb provides it. Mock a minimal
          # base unit (printf used instead of heredoc to keep the unit
          # lines inside the YAML block scalar indentation).
          # Use /bin/true as ExecStart so systemd-analyze doesn't fail
          # on a missing /usr/bin/snapclient binary in the CI runner —
          # we only care about the drop-in's syntactic validity.
          {
            printf '[Unit]\n'
            printf 'Description=Snapcast client\n'
            printf '[Service]\n'
            printf 'ExecStart=/bin/true\n'
            printf '[Install]\n'
            printf 'WantedBy=multi-user.target\n'
          } > "$tmpdir/snapclient.service"
          systemd-analyze verify "$tmpdir/snapclient.service" || {
            echo "ERROR: systemd drop-in failed verify"
            exit 1
          }
          echo "✓ systemd drop-in valid"
          rm -rf "$tmpdir"

      - name: Validate HAT config count
        run: |
          count=$(ls -1 client/common/audio-hats/*.conf | wc -l)
          if [ "$count" -ne 17 ]; then
            echo "Expected 17 HAT configs, found $count"
            exit 1
          fi
          echo "All 17 HAT configs present"

      - name: Check environment template
        run: |
          source .env.example
          : ${MUSIC_PATH:?Missing MUSIC_PATH}
          echo "✓ Required environment variables defined"
