name: Deploy to Home Server

on:
  workflow_dispatch:
    # Manual dispatch uses repository secrets directly (no inputs needed).
    # Requires DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, HOST, USER, SSH_KEY
    # to be configured as repository secrets.
  workflow_call:
    secrets:
      HOST:
        required: true
      USER:
        required: true
      SSH_KEY:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: snapcast-runner
    steps:
      - uses: actions/checkout@v6

      - name: Copy updated docker-compose.yml
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          HOST: ${{ secrets.HOST }}
          DEPLOY_USER: ${{ secrets.USER }}
        run: |
          KEY_FILE=$(mktemp)
          echo "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=no "${DEPLOY_USER}@${HOST}" "mkdir -p /tmp/snapmulti-deploy"
          scp -i "$KEY_FILE" -o StrictHostKeyChecking=no docker-compose.yml "${DEPLOY_USER}@${HOST}:/tmp/snapmulti-deploy/docker-compose.yml"
          rm -f "$KEY_FILE"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DEPLOY_VERSION: ${{ github.ref_name }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DEPLOY_VERSION
          script: |
            set -euo pipefail

            cd /opt/snapmulti || { echo "ERROR: Directory not found"; exit 1; }

            echo "Deploying version: ${DEPLOY_VERSION}"

            echo "Updating docker-compose.yml..."
            sudo cp /tmp/snapmulti-deploy/docker-compose.yml /opt/snapmulti/docker-compose.yml
            rm -rf /tmp/snapmulti-deploy

            echo "Updating SNAPMULTI_VERSION in .env..."
            if grep -q '^SNAPMULTI_VERSION=' .env 2>/dev/null; then
              sudo sed -i "s|^SNAPMULTI_VERSION=.*|SNAPMULTI_VERSION=${DEPLOY_VERSION}|" .env
            else
              echo "SNAPMULTI_VERSION=${DEPLOY_VERSION}" | sudo tee -a .env > /dev/null
            fi

            echo "Logging in to Docker Hub..."
            if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
              echo "ERROR: DOCKERHUB_USERNAME or DOCKERHUB_TOKEN secret is empty."
              echo "Ensure both are configured as repository secrets."
              exit 1
            fi
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin || { echo "ERROR: Docker Hub login failed"; exit 1; }

            echo "Ensuring COMPOSE_PROFILES=tidal on ARM (migration from pre-v0.3.5 .env)..."
            if [ "$(uname -m)" = "aarch64" ]; then
              if ! grep -q "^COMPOSE_PROFILES=" .env 2>/dev/null; then
                echo "COMPOSE_PROFILES=tidal" >> .env
                echo "Migrated .env: added COMPOSE_PROFILES=tidal"
              elif ! grep -q "^COMPOSE_PROFILES=.*tidal" .env; then
                sed -i "s/^COMPOSE_PROFILES=/COMPOSE_PROFILES=tidal,/" .env
                echo "Migrated .env: added tidal to existing COMPOSE_PROFILES"
              fi
            fi

            echo "Pulling latest images..."
            # COMPOSE_PROFILES in .env controls ARM-only services (tidal-connect)
            docker compose pull || { echo "ERROR: docker compose pull failed"; exit 1; }

            echo "Creating required directories..."
            mkdir -p mympd/workdir mympd/cachedir audio artwork

            echo "Stopping old containers..."
            docker compose down --remove-orphans || true

            echo "Baking deployment to SD card lower layer..."
            BAKE_DIR=$(mktemp -d /tmp/snapmulti-bake-XXXXX)
            cleanup() {
                sudo umount "$BAKE_DIR" 2>/dev/null || true
                rmdir "$BAKE_DIR" 2>/dev/null || true
                sudo sync
            }
            trap cleanup EXIT

            sudo mount --bind /media/root-ro "$BAKE_DIR"
            sudo mount -o remount,rw "$BAKE_DIR"

            # Persist config
            sudo rsync -a \
                /opt/snapmulti/.env \
                /opt/snapmulti/docker-compose.yml \
                "$BAKE_DIR/opt/snapmulti/"

            # Persist myMPD user state (UI customizations, playlists)
            sudo rsync -a /opt/snapmulti/mympd/workdir/ \
                "$BAKE_DIR/opt/snapmulti/mympd/workdir/"

            # Persist MPD database (avoids full NFS/SMB rescan on reboot; incremental update only)
            if [ -f /opt/snapmulti/mpd/data/mpd.db ]; then
                sudo mkdir -p "$BAKE_DIR/opt/snapmulti/mpd/data"
                sudo rsync -a /opt/snapmulti/mpd/data/mpd.db \
                    "$BAKE_DIR/opt/snapmulti/mpd/data/"
            fi

            # Persist Docker image index (always sync, tiny)
            sudo rsync -a /var/lib/docker/image/ \
                "$BAKE_DIR/var/lib/docker/image/"

            # Persist new image layers only (fuse-overlayfs uses user.overlay.* xattrs)
            sudo rsync -aX --ignore-existing /var/lib/docker/fuse-overlayfs/ \
                "$BAKE_DIR/var/lib/docker/fuse-overlayfs/"

            # Verify version was actually written
            BAKED=$(grep '^SNAPMULTI_VERSION=' "$BAKE_DIR/opt/snapmulti/.env" 2>/dev/null | cut -d= -f2)
            if [[ "$BAKED" != "${DEPLOY_VERSION}" ]]; then
                echo "ERROR: Bake verification failed -- expected ${DEPLOY_VERSION}, got ${BAKED}"
                exit 1
            fi

            sudo sync
            echo "Bake complete (${DEPLOY_VERSION}) -- changes will survive reboot."

            echo "Starting app containers..."
            docker compose up -d || { echo "ERROR: docker compose up failed"; exit 1; }

            echo "Verifying deployment..."
            sleep 5
            docker ps --format "table {{.Names}}\t{{.Status}}"

            echo "Deployment complete (version: ${DEPLOY_VERSION})"
