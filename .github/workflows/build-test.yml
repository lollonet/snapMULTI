name: Test Docker Builds

on:
  pull_request:
    paths:
      # Server Dockerfiles
      - 'Dockerfile.*'
      # Client Dockerfiles and dependencies
      - 'client/common/docker/**'
      # Files COPYed into server images
      - 'scripts/mpd-entrypoint.sh'
      - 'scripts/airplay-entrypoint.sh'
      - 'scripts/meta_shairport.py'
      - 'scripts/meta_tidal.py'
      - 'scripts/common/sanitize.sh'
      - 'scripts/tidal/**'
      - 'docker/metadata-service/**'
      - 'patches/meta_mpd.py'
      - 'config/mpd.conf'
      - 'config/snapserver.conf'
      - 'config/shairport-sync.conf'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.snapserver
            binary: snapserver
          - dockerfile: Dockerfile.shairport-sync
            binary: shairport-sync
          # Spotify Connect: uses official ghcr.io/devgianlu/go-librespot (no build needed)
          - dockerfile: Dockerfile.mpd
            binary: mpd
          - dockerfile: Dockerfile.metadata
            binary: python3
          # Tidal: ARM-only, base image has ARM binaries
          - dockerfile: Dockerfile.tidal
            binary: bash
            arm_only: true
          # Client images (ARM-only, built on Mac runner in build-push.yml)
          - dockerfile: client/common/docker/snapclient/Dockerfile
            context: client/common/docker/snapclient
            binary: snapclient
            arm_only: true
          - dockerfile: client/common/docker/audio-visualizer/Dockerfile
            context: client/common/docker/audio-visualizer
            binary: python3
            arm_only: true
          - dockerfile: client/common/docker/fb-display/Dockerfile
            context: client/common/docker/fb-display
            binary: python3
            arm_only: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image tag
        id: vars
        run: echo "TAG=test-$(basename ${{ matrix.dockerfile }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get latest snapcast commit SHA
        if: matrix.dockerfile == 'Dockerfile.snapserver'
        id: snapcast
        run: |
          SHA=$(git ls-remote https://github.com/badaix/snapcast.git HEAD | cut -f1)
          if [[ -z "$SHA" ]]; then
            echo "ERROR: Failed to fetch snapcast HEAD commit"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Check architecture
        id: arch
        run: echo "arch=$(uname -m)" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.dockerfile }}
        if: "!matrix.arm_only || steps.arch.outputs.arch == 'aarch64'"
        run: |
          echo "Building image: ${{ steps.vars.outputs.TAG }}:latest"
          BUILD_ARGS=""
          if [ -n "${{ steps.snapcast.outputs.sha }}" ]; then
            BUILD_ARGS="--build-arg SNAPCAST_SHA=${{ steps.snapcast.outputs.sha }}"
          fi
          docker build -f ${{ matrix.dockerfile }} $BUILD_ARGS \
            --tag ${{ steps.vars.outputs.TAG }}:latest ${{ matrix.context || '.' }} || {
            echo "ERROR: Docker build failed for ${{ matrix.dockerfile }}"
            exit 1
          }

      - name: Skip ARM-only build on x86
        if: matrix.arm_only && steps.arch.outputs.arch != 'aarch64'
        run: echo "Skipping ${{ matrix.dockerfile }} - ARM-only, running on ${{ steps.arch.outputs.arch }}"

      - name: Test container
        if: "!matrix.arm_only || steps.arch.outputs.arch == 'aarch64'"
        run: |
          echo "Testing container: ${{ steps.vars.outputs.TAG }}:latest"
          docker run --rm --entrypoint which ${{ steps.vars.outputs.TAG }}:latest ${{ matrix.binary }} || {
            echo "ERROR: Container test failed for ${{ matrix.dockerfile }}"
            exit 1
          }
          echo "✓ Container test passed"
