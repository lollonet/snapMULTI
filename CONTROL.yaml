project:
  name: snapMULTI
  language: bash
  secondary_languages: [python]
  ci_platform: github

quality:
  paths: ["scripts", "docker"]

  coverage:
    enforce: false
    line: 0
    branch: 0

  complexity:
    enforce: false
    mccabe:
      warn: 10
      fail: 15
    func_loc:
      warn: 40
      fail: 60

  linting:
    bash:
      tool: shellcheck
      severity: warning
      paths: ["scripts/**/*.sh"]
    python:
      tool: ruff
      paths: ["docker/metadata-service/", "scripts/meta_*.py", "tests/"]
      exclude: ["patches/"]
    docker:
      tool: hadolint
      config: .hadolint.yaml
      paths: ["Dockerfile.*"]

  formatting:
    python:
      tool: ruff
      paths: ["docker/metadata-service/", "scripts/meta_*.py", "tests/"]
      exclude: ["patches/"]

  validation:
    - name: docker-compose-syntax
      command: "docker compose config --quiet"
    - name: shellcheck
      command: "shellcheck -x -S warning scripts/**/*.sh"
    - name: ruff-check
      command: "ruff check docker/metadata-service/ scripts/meta_*.py tests/"
    - name: ruff-format
      command: "ruff format --check docker/metadata-service/ scripts/meta_*.py tests/"
    - name: hadolint
      command: "hadolint --config .hadolint.yaml Dockerfile.*"
    - name: pytest
      command: "pytest tests/ -v --tb=short"
