# snapMULTI Docker Compose
# Hardware profile auto-detected by deploy.sh: minimal | standard | performance

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

# Services that read/write FIFOs and use D-Bus (Avahi/zeroconf)
x-fifo-security: &fifo-security
  <<: *default-security
  security_opt:
    - apparmor:unconfined  # Required for D-Bus access (Avahi zeroconf)
    - no-new-privileges:true
  cap_add:
    - DAC_OVERRIDE

services:
  snapserver:
    image: lollonet/snapmulti-server:${IMAGE_TAG:-latest}
    container_name: snapserver
    hostname: snapmulti
    restart: unless-stopped
    network_mode: host
    <<: *fifo-security
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /run:size=64M
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./config/snapserver.conf:/etc/snapserver.conf:ro
      - ./config:/config:ro
      - ./data:/data
      - ./audio:/audio
      # libavahi-client needs this socket to publish full SRV/TXT records (not just PTR)
      - /run/avahi-daemon/socket:/run/avahi-daemon/socket
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    environment:
      - TZ=${TZ:-Europe/Berlin}
    command: ["snapserver", "-c", "/etc/snapserver.conf"]
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:1780/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: ${SNAPSERVER_MEM_LIMIT:-192M}
          cpus: '${SNAPSERVER_CPU_LIMIT:-1.0}'
        reservations:
          memory: ${SNAPSERVER_MEM_RESERVE:-96M}

  shairport-sync:
    image: lollonet/snapmulti-airplay:${IMAGE_TAG:-latest}
    container_name: shairport-sync
    restart: unless-stopped
    network_mode: host
    <<: *fifo-security
    read_only: true
    tmpfs:
      - /tmp:size=32M
      - /run:size=32M
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./audio:/audio
      - ./config/shairport-sync.conf:/etc/shairport-sync.conf:ro
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      # See librespot below for the rationale — `$(hostname)` fallback in
      # airplay-entrypoint.sh resolves to the container ID without this.
      - /etc/hostname:/etc/hostname:ro
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - DEVICE_NAME=${AIRPLAY_NAME:-}
    depends_on:
      snapserver:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x shairport-sync && test -p /audio/airplay_fifo || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${AIRPLAY_MEM_LIMIT:-64M}
          cpus: '${AIRPLAY_CPU_LIMIT:-0.5}'
        reservations:
          memory: ${AIRPLAY_MEM_RESERVE:-32M}

  # Spotify Connect — go-librespot with metadata via WebSocket API
  # Open Spotify app → Connect to a device → Select "<hostname> Spotify"
  # Metadata + playback control via meta_go-librespot.py (Snapcast plugin)
  librespot:
    image: ghcr.io/devgianlu/go-librespot:v0.7.1
    container_name: librespot
    restart: unless-stopped
    network_mode: host
    <<: *fifo-security
    read_only: true
    tmpfs:
      - /tmp:size=32M
      - /config:size=1M       # Credential cache (volatile — re-auth via Spotify app after restart)
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./config/go-librespot.yml:/config/config.yml:ro
      - ./audio:/audio
      - /var/run/dbus:/var/run/dbus
      # Bind-mount /etc/hostname so `hostname` inside the container returns
      # the Pi hostname instead of the container ID. `network_mode: host`
      # shares only the NET namespace, not UTS — without this bind the
      # entrypoint command below resolves `$(hostname)` to the container
      # ID and Spotify advertises the device as "a1b2c3d4e5f6 Spotify"
      # instead of "<hostname> Spotify". Same fix as tidal-connect below.
      - /etc/hostname:/etc/hostname:ro
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - SPOTIFY_NAME=${SPOTIFY_NAME:-}
    entrypoint: ["sh", "-c"]
    command:
      - |
        # Use same sanitization logic as other services (match sanitize_device_name)
        NAME="$${SPOTIFY_NAME:-$$(hostname) Spotify}"
        NAME=$$(printf '%s' "$$NAME" | tr -cd 'A-Za-z0-9 ._-')
        [ -z "$$NAME" ] && NAME="snapMULTI Spotify"
        sed "s/^device_name:.*/device_name: \"$$NAME\"/" /config/config.yml > /tmp/config.yml
        # Hold FIFO open (read-write) so snapserver keeps its reader active;
        # without this, go-librespot's O_NONBLOCK write open gets ENXIO
        exec 3<>/audio/spotify_fifo
        exec go-librespot --config_dir /tmp
    depends_on:
      snapserver:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pgrep go-librespot && wget -q --spider http://127.0.0.1:24879/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: ${SPOTIFY_MEM_LIMIT:-256M}
          cpus: '${SPOTIFY_CPU_LIMIT:-0.5}'
        reservations:
          memory: ${SPOTIFY_MEM_RESERVE:-128M}

  mympd:
    image: ghcr.io/jcorporation/mympd/mympd:latest
    container_name: mympd
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32M
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./mympd/workdir:/var/lib/mympd
      - ./mympd/cachedir:/var/cache/mympd
      - ${MUSIC_PATH:-/media/music}:/music:ro
      - ./mpd/playlists:/playlists:ro
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - MYMPD_HTTP_PORT=8180
      - MYMPD_SSL=false
    # service_started (not service_healthy): myMPD retries MPD connection
    # internally. Using service_healthy would block on MPD's 60s healthcheck
    # interval, adding unnecessary delay on large NFS/SMB libraries.
    depends_on:
      mpd:
        condition: service_started
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8180/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: ${MPD_START_PERIOD:-300s}
    deploy:
      resources:
        limits:
          memory: ${MYMPD_MEM_LIMIT:-64M}
          cpus: '${MYMPD_CPU_LIMIT:-0.5}'
        reservations:
          memory: ${MYMPD_MEM_RESERVE:-32M}

  mpd:
    image: lollonet/snapmulti-mpd:${IMAGE_TAG:-latest}
    container_name: mpd
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /run:size=32M
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./audio:/audio
      - ${MUSIC_PATH:-/media/music}:/music:ro
      - ./config/mpd.conf:/etc/mpd.conf:ro
      - ./mpd/playlists:/playlists
      - ./mpd/data:/data
      - /run/avahi-daemon/socket:/run/avahi-daemon/socket
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    environment:
      - TZ=${TZ:-Europe/Berlin}
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "echo 'ping' | nc -w 2 127.0.0.1 6600 | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: ${MPD_START_PERIOD:-300s}
    deploy:
      resources:
        limits:
          memory: ${MPD_MEM_LIMIT:-512M}
          cpus: '${MPD_CPU_LIMIT:-1.0}'
        reservations:
          memory: ${MPD_MEM_RESERVE:-256M}

  # Metadata Service — centralized cover art + track info for all streams
  # WebSocket (port 8082): clients subscribe with CLIENT_ID to get their stream's metadata
  # HTTP (port 8083): serves artwork files and metadata.json
  metadata:
    image: lollonet/snapmulti-metadata:${IMAGE_TAG:-latest}
    container_name: metadata
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=32M
    user: "${PUID:-1000}:${PGID:-1000}"
    # Same shutdown-stall fix as fb-display / audio-visualizer: tini as
    # PID 1 propagates SIGTERM and reaps zombies; short grace period so
    # Docker SIGKILLs fast and the host PID disappears before
    # systemd-shutdown enumerates it. Without this, on `both` installs
    # (server+client on the same Pi) every reboot adds ~90 s per
    # Python container — three containers × 90 s ≈ 4.5 min.
    init: true
    stop_grace_period: 2s
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - EXTERNAL_HOST=${EXTERNAL_HOST:-}
      # SNAPMULTI_VERSION is baked into the image at build time (see
      # Dockerfile.metadata + build-push.yml --build-arg), so /health and
      # /version always report the actually-running code's version.
    volumes:
      - ./artwork:/app/artwork
      # Bind-mount the renderer source so a fix lands without an image
      # rebuild — same pattern as client/fb_display.py + visualizer.py.
      # The file is also COPYed into the image at build time
      # (Dockerfile.metadata) as a fallback for fresh installs that
      # haven't yet rsync'd `docker/` from the boot partition.
      - ./docker/metadata-service/metadata-service.py:/app/metadata-service.py:ro
      # /audio:/audio (read-only) — so the renderer can serve the
      # system-status.json snapshot written by snapmulti-status.timer
      # on the host. Without this mount, /status renders the
      # "no snapshot available" failure verdict even when the host-side
      # timer is healthy (issue surfaced after v0.6.4 ship).
      - ./audio:/audio:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      snapserver:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${METADATA_MEM_LIMIT:-128M}
          cpus: '${METADATA_CPU_LIMIT:-0.5}'
        reservations:
          memory: ${METADATA_MEM_RESERVE:-64M}

  # Tidal Connect - Cast from Tidal app (ARM only: Pi 3/4/5)
  # Open Tidal app → Select device → "<hostname> Tidal"
  # Note: x86_64 not supported - tidal-connect binaries are ARM-only
  #
  # SECURITY NOTICE: tidal-connect base image is Raspbian Stretch (EOL 2019-07).
  # We pull APT packages from archive.debian.org with `trusted=yes` and bypass
  # Valid-Until checks. The tidal-connect binary itself is proprietary and
  # unmaintained. This service is **opt-in** (Compose profile `tidal`):
  # enable only if you accept the security trade-off. See docs/USAGE.md#tidal-connect-security-note.
  tidal-connect:
    image: lollonet/snapmulti-tidal:${IMAGE_TAG:-latest}
    container_name: tidal-connect
    profiles:
      - tidal
    network_mode: host
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE   # Restore after cap_drop: ALL — root needs it to write FIFOs owned by PUID
    tmpfs:
      - /tmp:size=64M
      - /config:size=1M
    volumes:
      - ./audio:/audio
      - ./config/tidal-asound.conf:/userconfig/asound.conf:ro
      # Bind-mount the metadata bridge from the repo so script-only fixes
      # (e.g. the Tidal-base-image sed range bug, the TUI panel-marker regex
      # bug) take effect on `compose up -d` without rebuilding snapmulti-tidal.
      # The image still ships its own copy as a baseline; this mount overrides
      # it on devices that have the repo checked out at /opt/snapmulti.
      - ./scripts/tidal/tidal-meta-bridge.sh:/tidal-meta-bridge.sh:ro
      - /var/run/dbus:/var/run/dbus
      - /etc/hostname:/etc/hostname:ro
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - FRIENDLY_NAME=${TIDAL_NAME:-}
      - FORCE_PLAYBACK_DEVICE=default
      - ALSA_CONFIG_PATH=/tmp/asound.conf
    depends_on:
      snapserver:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f speaker_controller || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${TIDAL_MEM_LIMIT:-96M}
          cpus: '${TIDAL_CPU_LIMIT:-0.5}'
        reservations:
          memory: ${TIDAL_MEM_RESERVE:-48M}
