# gitleaks configuration for snapMULTI
# Extends the default rule set (https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml)
# and adds an allowlist for synthetic test fixtures that may otherwise trip
# entropy-based heuristics (generic-api-key etc.).

[extend]
useDefault = true

[allowlist]
description = "Synthetic fixtures + public kernel flags are not real credentials"
paths = [
    # Test fixtures may include token-shaped placeholders to exercise
    # anonymisation/redaction code. These are NOT real credentials.
    '''tests/.*\.sh$''',
    '''tests/.*\.py$''',
]
regexes = [
    # Public kernel cmdline flag (ADR-007). Assigned to a variable in
    # prepare-sd.sh / .ps1 — generic-api-key fires on the value's
    # entropy. It is a publicly-documented kernel parameter, never a
    # secret.
    '''ipv6\.disable=1''',
]
